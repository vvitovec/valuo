name: Market Backfill

on:
  workflow_dispatch:
    inputs:
      target_curated_rows:
        description: "Target curated rows"
        required: false
        default: "1000"
      max_rounds:
        description: "Maximum backfill rounds"
        required: false
        default: "10"
      max_listings_per_source:
        description: "Maximum listings per source in each round"
        required: false
        default: "250"

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      TARGET_CURATED_ROWS: ${{ github.event.inputs.target_curated_rows || '1000' }}
      BACKFILL_MAX_ROUNDS: ${{ github.event.inputs.max_rounds || '10' }}
      MAX_LISTINGS_PER_SOURCE: ${{ github.event.inputs.max_listings_per_source || '250' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Create virtual environment and install pipeline dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ./pipeline[dev]

      - name: Install worker dependencies
        run: npm ci

      - name: Run backfill and publish
        run: ./ops/run-backfill.sh

      - name: Write workflow summary
        if: always()
        run: |
          .venv/bin/python -m praha_predictor.cli status >> "$GITHUB_STEP_SUMMARY" || true

      - name: Send failure alert
        if: failure()
        run: ./ops/send-alert.sh backfill failed "GitHub Actions run ${GITHUB_RUN_ID}"

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-backfill-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            artifacts/*.json
            data/reports/*.json
            data/normalized/*.parquet
